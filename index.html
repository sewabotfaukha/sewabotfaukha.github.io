<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS — Interactive 3D Developer Portfolio</title>
  <meta name="description" content="NEXUS — Interactive 3D Developer Portfolio dibangun dengan Three.js & GSAP." />

  <!-- ============ Fonts ============ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- ============ Stylesheet (entry point) ============ -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ============ Import Map: Three.js & GSAP via CDN (tanpa build tools) ============ -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
      }
    }
  </script>
</head>
<body>

  <!-- ============ Loading Screen ============ -->
  <div class="nexus-loader" role="status" aria-live="polite">
    <span class="nexus-loader__mark">NEXUS · LOADING</span>
  </div>

  <!-- ============ Canvas Three.js (latar belakang scene) ============ -->
  <canvas id="nexus-canvas" aria-hidden="true"></canvas>

  <!-- ============ Lapisan noise/grain dekoratif ============ -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ============ Navigasi minimal ============ -->
  <nav class="nexus-nav">
    <span class="nexus-nav__logo">Nexus</span>
    <span class="nexus-nav__coords" data-coords>X 00 · Y 00</span>
  </nav>

  <!-- ============ Hero Section ============ -->
  <main class="hero">
    <!-- Cincin dekoratif — motif orbit, merujuk pada OrbitControls & tema 3D -->
    <svg class="hero__ring" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="98" fill="none" stroke="url(#ringGradient)" stroke-width="0.5" stroke-dasharray="1 6" />
      <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ringGradient)" stroke-width="0.5" opacity="0.4" />
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c5cff" />
          <stop offset="100%" stop-color="#00e5ff" />
        </linearGradient>
      </defs>
    </svg>

    <div class="hero__panel">
      <span class="hero__eyebrow">Interactive Portfolio</span>

      <h1 class="hero__title">NEXUS</h1>

      <p class="hero__subtitle">Interactive 3D Developer Portfolio</p>

      <span class="hero__axis">X <span>·</span> Y <span>·</span> Z — spatial by design</span>

      <button class="btn" data-action="explore" type="button">
        <span>Explore Portfolio</span>
        <span class="btn__arrow" aria-hidden="true">→</span>
      </button>
    </div>

    <div class="hero__scroll-hint" aria-hidden="true">
      <span>Scroll</span>
      <span class="hero__scroll-line"></span>
    </div>
  </main>

  <!-- ============ Entry Point JavaScript (ES Module) ============ -->
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
