<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internet Map — Explore the Web as a Universe</title>
  <meta name="description" content="Internet Map visualizes the internet as a 3D universe of interconnected websites." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Stylesheets (order matters: variables -> reset/layout -> glass -> animation -> hero -> responsive) -->
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/glass.css" />
  <link rel="stylesheet" href="assets/css/animation.css" />
  <link rel="stylesheet" href="assets/css/hero.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

  <!-- ================= LOADING SCREEN ================= -->
  <section id="loading-screen" aria-label="Loading">
    <div id="loading-content">
      <h1 id="loading-title">INTERNET MAP</h1>
      <div id="loading-bar-track">
        <div id="loading-bar-fill"></div>
      </div>
      <p id="loading-status">Initializing universe...</p>
    </div>
  </section>

  <!-- ================= HERO LANDING (AAA game-intro style) ================= -->
  <section id="hero-landing" aria-label="Internet Map introduction">

    <!-- Layered deep-space background -->
    <div id="hero-bg">
      <div id="hero-bg-gradient"></div>
      <canvas id="hero-stars-canvas" aria-hidden="true"></canvas>
      <div id="hero-nebula-1" class="hero-nebula" aria-hidden="true"></div>
      <div id="hero-nebula-2" class="hero-nebula" aria-hidden="true"></div>
      <div id="hero-glow-core" aria-hidden="true"></div>
      <div id="hero-noise" aria-hidden="true"></div>
      <div id="hero-vignette" aria-hidden="true"></div>
    </div>

    <!-- Foreground content -->
    <div id="hero-content">
      <p id="hero-kicker">A PREMIUM 3D EXPERIENCE</p>
      <h1 id="hero-title">
        <span class="hero-title-line" data-text="INTERNET">INTERNET</span>
        <span class="hero-title-line" data-text="MAP">MAP</span>
      </h1>
      <p id="hero-subtitle">Explore the Internet Like Never Before</p>

      <button id="hero-cta" type="button">
        <span id="hero-cta-label">START EXPLORING</span>
        <span id="hero-cta-glow" aria-hidden="true"></span>
      </button>
    </div>

    <div id="hero-scroll-hint" aria-hidden="true">
      <span id="hero-scroll-dot"></span>
    </div>

  </section>

  <!-- ================= LANDING / APP CONTAINER ================= -->
  <main id="landing-container" aria-hidden="true">

    <!-- Three.js render target -->
    <canvas id="scene-canvas" aria-label="3D internet universe canvas"></canvas>

    <!-- Focus Mode overlay (Phase 9) — soft blur + vignette behind the
         focused planet's UI, toggled via .is-active by ui.js -->
    <div id="focus-blur-overlay" aria-hidden="true"></div>

    <!-- Focus Mode persistent label (Phase 9) — name / category / owner
         stay visible while a planet is focused, independent of the sidebar -->
    <div id="focus-label" hidden>
      <span id="focus-label-name"></span>
      <span id="focus-label-meta">
        <span id="focus-label-category"></span>
        <span id="focus-label-dot">•</span>
        <span id="focus-label-owner"></span>
      </span>
    </div>

    <!-- Top bar: search -->
    <header id="topbar">
      <div id="brand">
        <span id="brand-mark">●</span>
        <span id="brand-name">Internet Map</span>
      </div>

      <div id="search-container" role="search">
        <input
          type="text"
          id="search-input"
          placeholder="Search a website, domain, or category..."
          autocomplete="off"
        />
        <div id="search-results" hidden></div>
      </div>

      <button id="audio-toggle" aria-label="Toggle ambient audio" aria-pressed="false">
        <span id="audio-icon">🔈</span>
      </button>
    </header>

    <!-- Sidebar: website details panel — slides in from the right when a
         planet is clicked (wired in ui.js's showPlanetSidebar) -->
    <aside id="sidebar" aria-label="Website details" hidden>
      <div id="sidebar-content">
        <!-- Populated dynamically by ui.js when a planet/galaxy is selected -->
        <!-- The close button is injected into the header by showPlanetSidebar / showGalaxySidebar -->
      </div>
    </aside>

    <!-- Planet hover tooltip — follows the mouse, shows name/category/visitors -->
    <div id="planet-tooltip" role="tooltip" hidden>
      <span id="tooltip-name"></span>
      <span id="tooltip-meta">
        <span id="tooltip-category"></span>
        <span id="tooltip-dot">•</span>
        <span id="tooltip-visitors"></span>
      </span>
    </div>

    <!-- Hyperlane hover tooltip (Phase 10) — "Source ➜ Target" label -->
    <div id="hyperlane-tooltip" role="tooltip" hidden>
      <span id="hyperlane-tooltip-label"></span>
    </div>

    <!-- Minimap -->
    <div id="minimap" aria-label="Universe minimap">
      <canvas id="minimap-canvas"></canvas>
    </div>

    <!-- Bottom-left status / HUD -->
    <div id="hud">
      <span id="hud-coords">x: 0.00, y: 0.00, z: 0.00</span>
      <span id="hud-fps">FPS: --</span>
    </div>

  </main>

  <!-- ================= JS ENTRY POINT ================= -->
  <!-- Three.js & GSAP via CDN, exposed as ES modules -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
    }
  }
  </script>
  <script type="module" src="assets/js/hero.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
